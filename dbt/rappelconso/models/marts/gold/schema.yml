version: 2

models:
  - name: dim_produit
    columns:
      - name: produit_key
        tests:
          - not_null
          - unique

  - name: dim_marque
    columns:
      - name: marque_key
        tests:
          - not_null
          - unique

  - name: dim_risque
    columns:
      - name: risque_key
        tests:
          - not_null
          - unique

  - name: dim_distributeur
    columns:
      - name: distributeur_key
        tests:
          - not_null
          - unique

  - name: dim_date
    columns:
      - name: date_key
        tests:
          - not_null
          - unique

  - name: fact_rappel
    columns:
      - name: fact_rappel_key
        tests:
          - not_null
          - unique
      - name: date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: produit_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_produit')
                field: produit_key
      - name: marque_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_marque')
                field: marque_key
      - name: risque_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_risque')
                field: risque_key
      - name: distributeur_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_distributeur')
                field: distributeur_key
