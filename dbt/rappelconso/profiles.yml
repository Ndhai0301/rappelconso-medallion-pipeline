rappelconso:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'admin') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD', 'admin123') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'rappelconso') }}"
      schema: gold
      threads: 4
