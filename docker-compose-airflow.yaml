x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    AIRFLOW__WEBSERVER__SECRET_KEY: rappelconso-local-secret
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    KAFKA_TOPIC: rappelconso_raw
    POSTGRES_HOST: db
    PYTHONPATH: /opt/airflow/project
  volumes:
    - .:/opt/airflow/project
    - ./dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ./.ivy2:/home/airflow/.ivy2
  user: "${AIRFLOW_UID:-1000}:0"
  networks:
    - airflow-kafka

services:
  db:
    image: postgres:14.22
    container_name: pipeline_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./sql/migrate_add_dedup_key.sql:/docker-entrypoint-initdb.d/002-migrate.sql:ro
      - ./sql/003_medallion.sql:/docker-entrypoint-initdb.d/003-medallion.sql:ro
      - ./sql/004_backfill_and_drop_dev.sql:/docker-entrypoint-initdb.d/004-backfill.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - airflow-kafka

  airflow-db:
    image: postgres:14.22
    container_name: airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - airflow-kafka

  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || airflow users list | grep -q admin
    depends_on:
      airflow-db:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-db:
        condition: service_healthy
      db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
      db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  metabase:
    image: metabase/metabase:v0.50.34
    container_name: pipeline_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - metabase-data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - airflow-kafka

volumes:
  airflow-logs:
  airflow-db-data:
  metabase-data:

networks:
  airflow-kafka:
    external: true
